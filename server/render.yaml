services:
  - type: web
    name: imaplace-api
    runtime: node
    repo: https://github.com/tu-usuario/imaplace-backend
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: imaplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: imaplace-db
    plan: free
    databaseName: imaplace
    user: imaplace
